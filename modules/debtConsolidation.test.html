<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Debt Consolidation Analyzer — BizSco</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#1e293b;padding:24px;font-size:14px}
h1{font-size:1.4rem;margin-bottom:4px}
.subtitle{color:#666;font-size:.88rem;margin-bottom:20px}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:1rem;margin-bottom:12px;color:#444}
label{display:block;font-size:.83rem;color:#555;margin-bottom:3px;margin-top:8px;font-weight:600}
input[type=number]{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:5px;font-size:.9rem}
input:focus{outline:none;border-color:#2563eb}
.loan-block{background:#f8fafc;border-radius:8px;padding:14px;border:1px solid #e2e8f0;margin-bottom:10px}
.loan-block h3{font-size:.84rem;font-weight:800;color:#475569;margin-bottom:6px}
.loan-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
@media(max-width:600px){.loan-grid{grid-template-columns:1fr}}
button.primary{margin-top:16px;padding:10px 28px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:.92rem;cursor:pointer;font-weight:700}
button.primary:hover{background:#1d4ed8}
button.secondary{padding:7px 16px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:6px;font-size:.82rem;cursor:pointer;margin-top:8px}
button.secondary:hover{background:#e2e8f0}
@media print{.back-link,button,.card>h2+*+button{display:none!important}body{background:#fff;padding:8px}#resultsSection{display:block!important}}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:600px){.compare-grid{grid-template-columns:1fr}}
.compare-panel{border-radius:10px;padding:16px;border:2px solid}
.compare-panel.before{background:#fef2f2;border-color:#fca5a5}
.compare-panel.after{background:#f0fdf4;border-color:#86efac}
.cp-title{font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.cp-title.before{color:#dc2626}
.cp-title.after{color:#16a34a}
.cp-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:.82rem}
.cp-row:last-child{border-bottom:none;font-weight:800;margin-top:4px}
.savings-banner{background:#1e293b;color:#e2e8f0;border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.sb-big{font-size:1.6rem;font-weight:900;color:#4ade80}
.sb-label{font-size:.78rem;color:#94a3b8;margin-top:2px}
.sb-item{text-align:center}
.rec-box{border-left:4px solid #16a34a;background:#f0fdf4;padding:12px 14px;border-radius:0 8px 8px 0;font-size:.84rem;color:#166534;line-height:1.6}
.rec-box.warn{border-color:#f59e0b;background:#fffbeb;color:#92400e}
.rec-box.neutral{border-color:#94a3b8;background:#f8fafc;color:#475569}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:#2563eb;text-decoration:none;margin-bottom:18px;font-weight:600}
.back-link:hover{text-decoration:underline}
</style>

<!-- Multi-country localization -->
<script src="../country-data.js"></script>
<script src="../country-switcher.js" defer></script>
</head>
<body>
<script>if(localStorage.getItem('fw_dark')==='1')document.documentElement.classList.add('dark');</script>
<script src="../sidebar.js"></script>
<script src="nav.js"></script>
<script src="fw-auth.js"></script>
<script src="help.js"></script>

<a href="../try.html" class="back-link">Back to Demo</a>
<h1>Debt Consolidation Analyzer</h1>
<p class="subtitle">BizSco — Should you consolidate your loans? See monthly savings and total interest impact.</p>

<div class="card">
  <h2>Your Existing Loans</h2>
  <div id="loanBlocks">
    <div class="loan-block">
      <h3>Loan 1</h3>
      <div class="loan-grid">
        <div><label>Outstanding Balance ($)</label><input type="number" class="bal" placeholder="e.g. 25000"/></div>
        <div><label>Monthly EMI ($)</label><input type="number" class="emi" placeholder="e.g. 650"/></div>
        <div><label>Annual Rate (%)</label><input type="number" class="rate" placeholder="e.g. 14" step="0.1"/></div>
      </div>
    </div>
    <div class="loan-block">
      <h3>Loan 2</h3>
      <div class="loan-grid">
        <div><label>Outstanding Balance ($)</label><input type="number" class="bal" placeholder="e.g. 15000"/></div>
        <div><label>Monthly EMI ($)</label><input type="number" class="emi" placeholder="e.g. 420"/></div>
        <div><label>Annual Rate (%)</label><input type="number" class="rate" placeholder="e.g. 18" step="0.1"/></div>
      </div>
    </div>
  </div>
  <button class="secondary" onclick="addLoan()">+ Add Another Loan</button>

  <h2 style="margin-top:20px">Proposed Consolidated Loan</h2>
  <div class="loan-grid">
    <div><label>New Annual Rate (%)</label><input type="number" id="newRate" placeholder="e.g. 11" step="0.1"/></div>
    <div><label>New Tenure (months)</label><input type="number" id="newTenure" placeholder="e.g. 60"/></div>
  </div>
  <button class="primary" onclick="analyze()">Analyze Consolidation &rarr;</button>
</div>

<div id="resultsSection" style="display:none">

  <div class="savings-banner" id="savingsBanner"></div>

  <div class="compare-grid" id="compareGrid"></div>

  <div class="card">
    <div class="rec-box" id="recBox"></div>
    <button onclick="window.print()" class="secondary no-print" style="margin-top:12px">Print / Save PDF</button>
  </div>

</div>

<script>
var loanCount = 2;
function fmt(n){ return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function addLoan(){
  if(loanCount >= 5) return;
  loanCount++;
  var div = document.createElement('div');
  div.className = 'loan-block';
  div.innerHTML = '<h3>Loan '+loanCount+'</h3><div class="loan-grid">'+
    '<div><label>Outstanding Balance ($)</label><input type="number" class="bal" placeholder="e.g. 10000"/></div>'+
    '<div><label>Monthly EMI ($)</label><input type="number" class="emi" placeholder="e.g. 300"/></div>'+
    '<div><label>Annual Rate (%)</label><input type="number" class="rate" placeholder="e.g. 16" step="0.1"/></div>'+
    '</div>';
  document.getElementById('loanBlocks').appendChild(div);
}

function calcEMI(P, annualRate, months){
  var r = annualRate / 100 / 12;
  if(r === 0) return P / months;
  return P * r * Math.pow(1+r,months) / (Math.pow(1+r,months)-1);
}

function analyze(){
  var bals  = document.querySelectorAll('.bal');
  var emis  = document.querySelectorAll('.emi');
  var rates = document.querySelectorAll('.rate');
  var newRate   = parseFloat(document.getElementById('newRate').value)||0;
  var newTenure = parseInt(document.getElementById('newTenure').value)||0;

  if(!newRate||!newTenure){ alert('Please fill the consolidated loan rate and tenure.'); return; }

  var totalBal = 0, totalEMI = 0, totalInterestBefore = 0;
  var hasData = false;

  for(var i=0; i<bals.length; i++){
    var b = parseFloat(bals[i].value)||0;
    var e = parseFloat(emis[i].value)||0;
    var r = parseFloat(rates[i].value)||0;
    if(b > 0 && e > 0){
      hasData = true;
      totalBal += b;
      totalEMI += e;
      /* Estimate remaining months */
      if(r > 0){
        var mr = r/100/12;
        var remainMonths = r > 0 ? Math.ceil(-Math.log(1-(b*mr/e)) / Math.log(1+mr)) : Math.ceil(b/e);
        totalInterestBefore += (e * remainMonths) - b;
      } else {
        totalInterestBefore += 0;
      }
    }
  }
  if(!hasData){ alert('Please fill at least one loan.'); return; }

  var newEMI = calcEMI(totalBal, newRate, newTenure);
  var totalInterestAfter = (newEMI * newTenure) - totalBal;
  var totalPaymentBefore = totalBal + totalInterestBefore;
  var totalPaymentAfter  = totalBal + totalInterestAfter;

  var monthlySaving = totalEMI - newEMI;
  var totalInterestSaving = totalInterestBefore - totalInterestAfter;
  var breakEvenMonths = monthlySaving > 0 && totalInterestAfter > totalInterestBefore
    ? Math.ceil((totalInterestAfter - totalInterestBefore) / monthlySaving) : 0;

  /* Savings banner */
  document.getElementById('savingsBanner').innerHTML =
    '<div class="sb-item"><div class="sb-big">'+fmt(monthlySaving)+'/mo</div><div class="sb-label">Monthly Savings</div></div>'+
    '<div class="sb-item"><div class="sb-big" style="color:'+(totalInterestSaving>=0?'#4ade80':'#f87171')+'">'+fmt(Math.abs(totalInterestSaving))+'</div><div class="sb-label">'+(totalInterestSaving>=0?'Total Interest Saved':'Extra Interest Paid')+'</div></div>'+
    '<div class="sb-item"><div class="sb-big" style="color:#60a5fa">'+fmt(newEMI)+'/mo</div><div class="sb-label">New Single EMI</div></div>';

  /* Compare grid */
  document.getElementById('compareGrid').innerHTML =
    '<div class="compare-panel before">'+
    '<div class="cp-title before">Before Consolidation</div>'+
    '<div class="cp-row"><span>Total Balance</span><span>'+fmt(totalBal)+'</span></div>'+
    '<div class="cp-row"><span>Monthly Payments</span><span>'+fmt(totalEMI)+'</span></div>'+
    '<div class="cp-row"><span>Estimated Interest</span><span>'+fmt(totalInterestBefore)+'</span></div>'+
    '<div class="cp-row"><span>Total Cost</span><span>'+fmt(totalPaymentBefore)+'</span></div>'+
    '</div>'+
    '<div class="compare-panel after">'+
    '<div class="cp-title after">After Consolidation</div>'+
    '<div class="cp-row"><span>Total Balance</span><span>'+fmt(totalBal)+'</span></div>'+
    '<div class="cp-row"><span>Monthly Payment</span><span>'+fmt(newEMI)+'</span></div>'+
    '<div class="cp-row"><span>Total Interest</span><span>'+fmt(totalInterestAfter)+'</span></div>'+
    '<div class="cp-row"><span>Total Cost</span><span>'+fmt(totalPaymentAfter)+'</span></div>'+
    '</div>';

  /* Recommendation */
  var recEl = document.getElementById('recBox');
  if(monthlySaving > 0 && totalInterestSaving > 0){
    recEl.className = 'rec-box';
    recEl.textContent = '? Consolidation recommended. You save '+fmt(monthlySaving)+'/mo and '+fmt(totalInterestSaving)+' in total interest. Simplified to one payment at a lower rate.';
  } else if(monthlySaving > 0 && totalInterestSaving < 0){
    recEl.className = 'rec-box warn';
    recEl.textContent = '?? Mixed result. Your monthly payment drops by '+fmt(monthlySaving)+'/mo which helps cash flow, but the longer tenure costs '+fmt(Math.abs(totalInterestSaving))+' extra in total interest. Choose based on whether you need cash flow relief now.';
  } else {
    recEl.className = 'rec-box neutral';
    recEl.textContent = '? Consolidation not recommended at these terms. Your new EMI ('+fmt(newEMI)+') is higher than current payments ('+fmt(totalEMI)+'). Try a lower rate or longer tenure.';
  }

  document.getElementById('resultsSection').style.display = 'block';
  saveState();
}

var DC_KEY = 'fw_debt_consolidation';
function saveState(){
  var loans=[];
  var bals=document.querySelectorAll('.bal');
  var emis=document.querySelectorAll('.emi');
  var rates=document.querySelectorAll('.rate');
  for(var i=0;i<bals.length;i++) loans.push({bal:bals[i].value,emi:emis[i].value,rate:rates[i].value});
  try{localStorage.setItem(DC_KEY,JSON.stringify({loans:loans,newRate:document.getElementById('newRate').value,newTenure:document.getElementById('newTenure').value}));}catch(e){}
}

(function(){
  try{
    var s=JSON.parse(localStorage.getItem(DC_KEY)||'null');
    if(!s) return;
    if(s.newRate) document.getElementById('newRate').value=s.newRate;
    if(s.newTenure) document.getElementById('newTenure').value=s.newTenure;
    if(s.loans&&s.loans.length){
      for(var i=2;i<s.loans.length;i++) addLoan();
      var bals=document.querySelectorAll('.bal'),emis=document.querySelectorAll('.emi'),rates=document.querySelectorAll('.rate');
      for(var j=0;j<Math.min(s.loans.length,bals.length);j++){
        bals[j].value=s.loans[j].bal||'';
        emis[j].value=s.loans[j].emi||'';
        rates[j].value=s.loans[j].rate||'';
      }
    }
    /* Load from fw_profile if no saved state */
  }catch(e){}
  /* Profile fallback */
  try{
    if(localStorage.getItem(DC_KEY)) return;
    var idx=parseInt(localStorage.getItem('fw_active_idx')||'0');
    var p=JSON.parse(localStorage.getItem('fw_profiles')||'[]')[idx]||JSON.parse(localStorage.getItem('fw_profile')||'null');
    if(p&&p.emi){ document.querySelector('.emi').value=p.emi||''; }
    if(p&&p.loan){ document.querySelector('.bal').value=p.loan||''; document.getElementById('newTenure').value=p.tenure||36; }
  }catch(e){}
})();
</script>
</body>
</html>
