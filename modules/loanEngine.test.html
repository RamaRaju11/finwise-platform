<script>
// ─── Loan Engine (Module 2) ───────────────────────────────────────────────

function _round(n) { return Math.round(n * 100) / 100; }

function _validate(principal, annualRate, tenureMonths) {
  if (typeof principal !== "number" || typeof annualRate !== "number" || typeof tenureMonths !== "number")
    throw new Error("All inputs must be numbers.");
  if (principal <= 0) throw new Error("principal must be greater than 0.");
  if (annualRate < 0) throw new Error("annualRate cannot be negative.");
  if (tenureMonths <= 0 || !Number.isInteger(tenureMonths)) throw new Error("tenureMonths must be a positive integer.");
}

function calculateEMI(principal, annualRate, tenureMonths) {
  _validate(principal, annualRate, tenureMonths);
  const r = annualRate / 12 / 100;
  let emi;
  if (r === 0) {
    emi = principal / tenureMonths;
  } else {
    const factor = Math.pow(1 + r, tenureMonths);
    emi = (principal * r * factor) / (factor - 1);
  }
  return { emi: _round(emi), totalPayment: _round(emi * tenureMonths), totalInterest: _round(emi * tenureMonths - principal) };
}

function generateAmortizationSchedule(principal, annualRate, tenureMonths) {
  _validate(principal, annualRate, tenureMonths);
  const { emi } = calculateEMI(principal, annualRate, tenureMonths);
  const r = annualRate / 12 / 100;
  const schedule = [];
  let balance = principal;
  for (let month = 1; month <= tenureMonths; month++) {
    const openingBalance = balance;
    const interest = _round(balance * r);
    let principalPaid = month === tenureMonths ? _round(balance) : _round(emi - interest);
    const closingBalance = _round(Math.max(0, balance - principalPaid));
    balance = closingBalance;
    schedule.push({ month, openingBalance: _round(openingBalance), emi: _round(emi), principal: principalPaid, interest, closingBalance });
    if (balance <= 0) break;
  }
  const totalInterest = _round(schedule.reduce((s, r) => s + r.interest, 0));
  return { emi: _round(emi), totalPayment: _round(principal + totalInterest), totalInterest, schedule };
}

function applyPrepayment(principal, annualRate, tenureMonths, prepayMonth, prepayAmount, strategy = "reduce-tenure") {
  _validate(principal, annualRate, tenureMonths);
  if (prepayMonth < 1 || prepayMonth > tenureMonths) throw new Error("prepayMonth out of range.");
  if (prepayAmount <= 0) throw new Error("prepayAmount must be positive.");
  const { emi: originalEmi } = calculateEMI(principal, annualRate, tenureMonths);
  const r = annualRate / 12 / 100;
  const schedule = [];
  let balance = principal;
  let currentEmi = originalEmi;
  for (let month = 1; month <= tenureMonths + 120; month++) {
    if (balance <= 0) break;
    const openingBalance = balance;
    const interest = _round(balance * r);
    let principalPaid = _round(currentEmi - interest);
    let prepaid = 0;
    if (month === prepayMonth) {
      prepaid = _round(Math.min(prepayAmount, Math.max(0, balance - principalPaid)));
      const remainingBalance = _round(balance - principalPaid - prepaid);
      const remainingMonths = tenureMonths - month;
      if (remainingBalance > 0 && remainingMonths > 0 && strategy === "reduce-emi") {
        const { emi: newEmi } = calculateEMI(remainingBalance, annualRate, remainingMonths);
        currentEmi = newEmi;
      }
    }
    const closingBalance = _round(Math.max(0, balance - principalPaid - prepaid));
    balance = closingBalance;
    schedule.push({ month, openingBalance: _round(openingBalance), emi: _round(principalPaid + interest), principal: principalPaid, interest, prepayment: prepaid, closingBalance });
    if (balance <= 0) break;
  }
  const totalInterest = _round(schedule.reduce((s, r) => s + r.interest, 0));
  const totalPayment = _round(principal + totalInterest + schedule.reduce((s, r) => s + r.prepayment, 0));
  const orig = generateAmortizationSchedule(principal, annualRate, tenureMonths);
  return {
    originalEmi: _round(originalEmi), newEmi: _round(currentEmi),
    newTenure: schedule.length, monthsSaved: tenureMonths - schedule.length,
    interestSaved: _round(orig.totalInterest - totalInterest),
    totalInterest, totalPayment, schedule,
  };
}

// ─── UI Helpers ───────────────────────────────────────────────────────────
const fmt  = n => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtN = n => n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function showTab(name) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  event.target.classList.add("active");
}

function getNum(id) { return parseFloat(document.getElementById(id).value); }
function getInt(id) { return parseInt(document.getElementById(id).value); }

// ─── EMI ──────────────────────────────────────────────────────────────────
function calcEMI() {
  const out = document.getElementById("emi-result");
  try {
    const r = calculateEMI(getNum("e-principal"), getNum("e-rate"), getInt("e-tenure"));
    out.innerHTML = `
      <div class="card">
        <div class="summary-grid">
          <div class="summary-item highlight"><div class="s-label">Monthly EMI</div><div class="s-val">${fmt(r.emi)}</div></div>
          <div class="summary-item"><div class="s-label">Total Payment</div><div class="s-val">${fmt(r.totalPayment)}</div></div>
          <div class="summary-item interest"><div class="s-label">Total Interest</div><div class="s-val">${fmt(r.totalInterest)}</div></div>
        </div>
      </div>`;
    saveLE();
  } catch(e) { out.innerHTML = err(e); }
}

// ─── Amortization ─────────────────────────────────────────────────────────
function calcAmort() {
  const out = document.getElementById("amort-result");
  try {
    const r = generateAmortizationSchedule(getNum("a-principal"), getNum("a-rate"), getInt("a-tenure"));
    const rows = r.schedule.map(s => `
      <tr>
        <td>${s.month}</td>
        <td>${fmt(s.openingBalance)}</td>
        <td>${fmt(s.emi)}</td>
        <td>${fmt(s.principal)}</td>
        <td>${fmt(s.interest)}</td>
        <td>${fmt(s.closingBalance)}</td>
      </tr>`).join("");
    const totP = _round(r.schedule.reduce((s,x)=>s+x.principal,0));
    const totI = r.totalInterest;
    out.innerHTML = `
      <div class="card">
        <div class="summary-grid">
          <div class="summary-item highlight"><div class="s-label">Monthly EMI</div><div class="s-val">${fmt(r.emi)}</div></div>
          <div class="summary-item"><div class="s-label">Total Payment</div><div class="s-val">${fmt(r.totalPayment)}</div></div>
          <div class="summary-item interest"><div class="s-label">Total Interest</div><div class="s-val">${fmt(r.totalInterest)}</div></div>
        </div>
        <div class="scroll-table">
          <table>
            <thead><tr>
              <th>Month</th><th>Opening Balance</th><th>EMI</th>
              <th>Principal</th><th>Interest</th><th>Closing Balance</th>
            </tr></thead>
            <tbody>${rows}</tbody>
            <tfoot><tr class="tfoot">
              <td>Total</td><td></td><td>${fmt(r.totalPayment)}</td>
              <td>${fmt(totP)}</td><td>${fmt(totI)}</td><td>$0.00</td>
            </tr></tfoot>
          </table>
        </div>
      </div>`;
  } catch(e) { out.innerHTML = err(e); }
}

// ─── Prepayment ───────────────────────────────────────────────────────────
function calcPrepay() {
  const out = document.getElementById("prepay-result");
  try {
    const strategy = document.getElementById("p-strategy").value;
    const r = applyPrepayment(
      getNum("p-principal"), getNum("p-rate"), getInt("p-tenure"),
      getInt("p-month"), getNum("p-amount"), strategy
    );
    const rows = r.schedule.map(s => `
      <tr ${s.prepayment > 0 ? 'class="prepay-row"' : ''}>
        <td>${s.month}${s.prepayment > 0 ? ' <span class="badge prepay">PREPAY</span>' : ''}</td>
        <td>${fmt(s.openingBalance)}</td>
        <td>${fmt(s.emi)}</td>
        <td>${fmt(s.principal)}</td>
        <td>${fmt(s.interest)}</td>
        <td>${s.prepayment > 0 ? fmt(s.prepayment) : '-'}</td>
        <td>${fmt(s.closingBalance)}</td>
      </tr>`).join("");
    const strategyLabel = strategy === "reduce-tenure"
      ? `Tenure reduced by <b>${r.monthsSaved} months</b>`
      : `EMI reduced from <b>${fmt(r.originalEmi)}</b> to <b>${fmt(r.newEmi)}</b>`;
    out.innerHTML = `
      <div class="card">
        <div class="summary-grid">
          <div class="summary-item highlight"><div class="s-label">Original EMI</div><div class="s-val">${fmt(r.originalEmi)}</div></div>
          <div class="summary-item highlight"><div class="s-label">New EMI</div><div class="s-val">${fmt(r.newEmi)}</div></div>
          <div class="summary-item"><div class="s-label">New Tenure</div><div class="s-val">${r.newTenure} months</div></div>
          <div class="summary-item saved"><div class="s-label">Months Saved</div><div class="s-val">${r.monthsSaved}</div></div>
          <div class="summary-item saved"><div class="s-label">Interest Saved</div><div class="s-val">${fmt(r.interestSaved)}</div></div>
          <div class="summary-item interest"><div class="s-label">Total Interest Paid</div><div class="s-val">${fmt(r.totalInterest)}</div></div>
        </div>
        <p style="font-size:0.85rem;color:#555;margin-bottom:12px;">Strategy: ${strategyLabel}</p>
        <div class="scroll-table">
          <table>
            <thead><tr>
              <th>Month</th><th>Opening Balance</th><th>EMI</th>
              <th>Principal</th><th>Interest</th><th>Prepayment</th><th>Closing Balance</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } catch(e) { out.innerHTML = err(e); }
}

// ─── Unit Tests ───────────────────────────────────────────────────────────
function runTests() {
  const results = [];
  function assert(label, condition) { results.push({ label, pass: !!condition }); }
  function assertThrows(label, fn) {
    try { fn(); results.push({ label, pass: false, note: "expected error not thrown" }); }
    catch(e) { results.push({ label, pass: true }); }
  }

  // EMI
  const e1 = calculateEMI(500000, 12, 60);
  assert("EMI: principal=500k, 12%, 60m → emi≈11122", Math.abs(e1.emi - 11122.22) < 1);
  assert("EMI: totalPayment = emi × tenure", Math.abs(e1.totalPayment - e1.emi * 60) < 1);
  assert("EMI: totalInterest = totalPayment - principal", Math.abs(e1.totalInterest - (e1.totalPayment - 500000)) < 1);

  // 0% interest
  const e0 = calculateEMI(120000, 0, 12);
  assert("EMI: 0% rate → emi = principal / tenure", e0.emi === 10000);
  assert("EMI: 0% rate → totalInterest = 0", e0.totalInterest === 0);

  assertThrows("EMI: throws on negative principal", () => calculateEMI(-1000, 12, 60));
  assertThrows("EMI: throws on negative rate", () => calculateEMI(100000, -1, 60));
  assertThrows("EMI: throws on non-integer tenure", () => calculateEMI(100000, 12, 12.5));

  // Amortization
  const a = generateAmortizationSchedule(500000, 12, 60);
  assert("Amort: schedule has 60 rows", a.schedule.length === 60);
  assert("Amort: closing balance of last row ≈ 0", a.schedule[59].closingBalance <= 1);
  assert("Amort: month 1 interest = principal × monthly rate", Math.abs(a.schedule[0].interest - _round(500000 * 0.01)) < 1);
  assert("Amort: principal increases each month", a.schedule[1].principal > a.schedule[0].principal);
  assert("Amort: interest decreases each month", a.schedule[1].interest < a.schedule[0].interest);
  assert("Amort: totalInterest matches sum of schedule interests", Math.abs(a.totalInterest - a.schedule.reduce((s,r)=>s+r.interest,0)) < 1);

  // Prepayment – reduce tenure
  const pt = applyPrepayment(500000, 12, 60, 12, 50000, "reduce-tenure");
  assert("Prepay(reduce-tenure): newTenure < 60", pt.newTenure < 60);
  assert("Prepay(reduce-tenure): monthsSaved > 0", pt.monthsSaved > 0);
  assert("Prepay(reduce-tenure): interestSaved > 0", pt.interestSaved > 0);
  assert("Prepay(reduce-tenure): originalEmi = newEmi", pt.originalEmi === pt.newEmi);

  // Prepayment – reduce EMI
  const pe = applyPrepayment(500000, 12, 60, 12, 50000, "reduce-emi");
  assert("Prepay(reduce-emi): newEmi < originalEmi", pe.newEmi < pe.originalEmi);
  assert("Prepay(reduce-emi): interestSaved > 0", pe.interestSaved > 0);

  assertThrows("Prepay: throws on invalid month", () => applyPrepayment(500000, 12, 60, 0, 50000));
  assertThrows("Prepay: throws on zero amount", () => applyPrepayment(500000, 12, 60, 12, 0));

  const passed = results.filter(r => r.pass).length;
  const failed = results.filter(r => !r.pass).length;
  const html = results.map(r =>
    `<div class="test-result ${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'} ${r.label}${r.note ? ' — ' + r.note : ''}</div>`
  ).join("");
  const sc = failed === 0 ? "all-pass" : "has-fail";
  const st = failed === 0 ? `✅ All ${passed} tests passed` : `❌ ${failed} failed / ${passed} passed`;
  document.getElementById("test-output").innerHTML = html + `<div class="test-summary ${sc}">${st}</div>`;
}

function err(e) { return `<div style="padding:12px;background:#fee2e2;border-radius:6px;color:#dc2626;">❌ ${e.message}</div>`; }

// ─── Persistence ──────────────────────────────────────────────────────────
var LE_KEY2 = 'fw_loan_engine';
function saveLE(){
  try{
    localStorage.setItem(LE_KEY2, JSON.stringify({
      'e-principal':document.getElementById('e-principal').value,
      'e-rate':document.getElementById('e-rate').value,
      'e-tenure':document.getElementById('e-tenure').value,
      'a-principal':document.getElementById('a-principal').value,
      'a-rate':document.getElementById('a-rate').value,
      'a-tenure':document.getElementById('a-tenure').value,
      'p-principal':document.getElementById('p-principal').value,
      'p-rate':document.getElementById('p-rate').value,
      'p-tenure':document.getElementById('p-tenure').value,
      'p-month':document.getElementById('p-month').value,
      'p-amount':document.getElementById('p-amount').value,
      'p-strategy':document.getElementById('p-strategy').value,
    }));
  }catch(e){}
}
(function(){
  try{
    var s = JSON.parse(localStorage.getItem(LE_KEY2)||'null');
    if(s){
      ['e-principal','e-rate','e-tenure','a-principal','a-rate','a-tenure','p-principal','p-rate','p-tenure','p-month','p-amount'].forEach(function(id){
        var el = document.getElementById(id);
        if(el && s[id]!==undefined && s[id]!=='') el.value = s[id];
      });
      var ps = document.getElementById('p-strategy');
      if(ps && s['p-strategy']) ps.value = s['p-strategy'];
      return;
    }
  }catch(e){}
  try{
    var idx = parseInt(localStorage.getItem('fw_active_idx')||'0');
    var p = JSON.parse(localStorage.getItem('fw_profiles')||'[]')[idx] || JSON.parse(localStorage.getItem('fw_profile')||'null');
    if(!p) return;
    if(p.loan) { ['e-principal','a-principal','p-principal'].forEach(function(id){ document.getElementById(id).value=p.loan; }); }
    if(p.tenure) { ['e-tenure','a-tenure','p-tenure'].forEach(function(id){ document.getElementById(id).value=p.tenure; }); }
  }catch(e){}
})();
</script>
</body>
</html>
